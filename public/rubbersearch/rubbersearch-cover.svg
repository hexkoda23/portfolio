<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>
  
  <!-- Dot Grid Pattern -->
  <defs>
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.07" />
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="searchBarBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#dotGrid)"/>
  
  <!-- Ambient Glow Blobs -->
  <circle cx="400" cy="225" r="250" fill="url(#glow)" filter="blur(80px)" />
  <circle cx="100" cy="100" r="150" fill="#ea580c" fill-opacity="0.03" filter="blur(60px)" />

  <!-- Code / Infrastructure Graphic Elements -->
  <!-- Indexing pipeline lines/nodes -->
  <path d="M 120,320 L 220,320 L 300,260 L 400,260" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.4"/>
  <path d="M 680,320 L 580,320 L 500,260 L 400,260" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.4"/>
  
  <!-- Tech Labels / Tags -->
  <!-- TF-IDF -->
  <g transform="translate(110, 150)">
    <rect width="90" height="32" rx="16" fill="#1e293b" stroke="#f97316" stroke-width="1" stroke-opacity="0.6"/>
    <text x="45" y="20" fill="#f97316" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">TF-IDF</text>
  </g>
  <!-- Inverted Index -->
  <g transform="translate(580, 150)">
    <rect width="130" height="32" rx="16" fill="#1e293b" stroke="#f97316" stroke-width="1" stroke-opacity="0.6"/>
    <text x="65" y="20" fill="#f97316" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Inverted Index</text>
  </g>
  <!-- API Key -->
  <g transform="translate(80, 280)">
    <rect width="90" height="32" rx="16" fill="#1e293b" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
    <text x="45" y="20" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">API Key</text>
  </g>
  <!-- Search -->
  <g transform="translate(630, 280)">
    <rect width="80" height="32" rx="16" fill="#1e293b" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
    <text x="40" y="20" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Search</text>
  </g>

  <!-- Central Header Panel -->
  <g transform="translate(200, 60)">
    <!-- Title -->
    <text x="200" y="50" fill="#ffffff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" text-anchor="middle" letter-spacing="1.5">RubberSearch</text>
    <!-- Subtitle -->
    <text x="200" y="85" fill="#f97316" font-family="system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" letter-spacing="1">LIGHTWEIGHT SEARCH ENGINE API</text>
  </g>

  <!-- Mock Search Bar / UI Terminal -->
  <g transform="translate(180, 190)">
    <!-- Terminal Shadow / Background -->
    <rect width="440" height="150" rx="12" fill="url(#searchBarBg)" stroke="#334155" stroke-width="1.5" />
    <rect width="440" height="150" rx="12" fill="none" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.4" />
    
    <!-- Top bar window controls -->
    <circle cx="20" cy="18" r="5" fill="#ef4444" />
    <circle cx="36" cy="18" r="5" fill="#eab308" />
    <circle cx="52" cy="18" r="5" fill="#22c55e" />
    <text x="220" y="22" fill="#475569" font-family="monospace" font-size="11" text-anchor="middle">rubbersearch-api-v1</text>
    
    <!-- Inner Search Box -->
    <g transform="translate(25, 45)">
      <rect width="390" height="40" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1" />
      
      <!-- Magnifying Glass Icon -->
      <path d="M 20,20 A 6,6 0 1,1 8,20 A 6,6 0 1,1 20,20 M 18,24 L 23,29" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none" />
      
      <!-- Placeholder / Query text -->
      <text x="40" y="25" fill="#e2e8f0" font-family="monospace" font-size="13">GET /api/search?q=proximity+boost</text>
      
      <!-- Badge 'C#' / '.NET 9' -->
      <rect x="315" y="10" width="65" height="20" rx="4" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1" />
      <text x="347" y="24" fill="#f97316" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">.NET 9</text>
    </g>

    <!-- Console output -->
    <text x="25" y="112" fill="#38bdf8" font-family="monospace" font-size="11">Indexed:</text>
    <text x="85" y="112" fill="#94a3b8" font-family="monospace" font-size="11">1,240 docs</text>
    
    <text x="25" y="130" fill="#34d399" font-family="monospace" font-size="11">Search time:</text>
    <text x="120" y="130" fill="#94a3b8" font-family="monospace" font-size="11">0.45 ms (relevance ranked)</text>
  </g>
</svg>
